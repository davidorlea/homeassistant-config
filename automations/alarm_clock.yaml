- alias: Alarm Clock
  id: 5bed22d4-e379-4d9e-9363-4c7717c6358b
  triggers:
    - trigger: template
      value_template: "{{ now().strftime('%H:%M') == (today_at(states('input_datetime.alarm_clock')) - timedelta(minutes=10)).strftime('%H:%M') }}"
  conditions:
    - condition: state
      entity_id: input_boolean.alarm_clock
      state: 'on'
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.bed_mode
          state: 'on'
        - condition: state
          entity_id: input_select.bed_mode
          state: just on
  actions:
    - event: alarm_clock_wake_up_started
      event_data:
        delay: 600
    - delay:
        seconds: 600
    - event: alarm_clock_wake_up_finished
    - action: media_player.unjoin
      data:
        entity_id: media_player.sonos_device_schlafzimmer
    - action: media_player.volume_set
      target:
        entity_id: media_player.sonos_device_schlafzimmer
      data:
        volume_level: 0.04
    - action: media_player.volume_mute
      target:
        entity_id: media_player.sonos_device_schlafzimmer
      data:
        is_volume_muted: false
    - action: media_player.shuffle_set
      target:
        entity_id: media_player.sonos_device_schlafzimmer
      data:
        shuffle: true
    - action: media_player.select_source
      target:
        entity_id: media_player.sonos_device_schlafzimmer
      data:
        source: Apple Music Hits
