- alias: Turn Coffee Maschine off
  id: 8eb927c2-c053-453f-b29e-dd9724426f7a
  triggers:
    - trigger: state
      entity_id: input_select.away_mode
      from: 'off'
      to: just on
    - trigger: state
      entity_id: input_select.bed_mode
      from: 'off'
      to: just on
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.kitchen_coffee_machine

- alias: Turn Kitchen Fan on
  id: c2887c1d-e759-4d79-bcc5-1a3adee523ee
  triggers:
    - trigger: state
      entity_id: fan.kitchen_fan
      to: 'off'
      for:
        hours: 6
    - trigger: state
      entity_id: input_select.away_mode
      from: just on
      to: 'on'
    - trigger: state
      entity_id: input_select.bed_mode
      from: just on
      to: 'on'
  conditions:
    - condition: state
      entity_id: fan.kitchen_fan
      state: 'off'
      for:
        hours: 6
    - condition: or
      conditions:
        - condition: state
          entity_id: input_select.away_mode
          state: 'on'
        - condition: state
          entity_id: input_select.bed_mode
          state: 'on'
  actions:
    - action: fan.turn_on
      target:
        entity_id: fan.kitchen_fan

- alias: Turn Kitchen Fan off
  id: 1ca528ab-9344-4252-a21e-286e01cb322f
  triggers:
    - trigger: state
      entity_id: fan.kitchen_fan
      to: 'on'
      for:
        minutes: 60
    - trigger: state
      entity_id: input_select.away_mode
      from: 'on'
      to: just off
    - trigger: state
      entity_id: input_select.bed_mode
      from: 'on'
      to: just off
  actions:
    - action: fan.turn_off
      target:
        entity_id: fan.kitchen_fan
