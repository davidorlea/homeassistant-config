LetTheDogsOutIntent:
  description: >-
    Spielt ein Hundebellen-Geräusch über die Sonos-Lautsprecher im Wohnzimmer und in der Küche ab.
  speech:
    type: plain
    text: >-
      Okay, lassen wir sie raus!
  action:
    - delay:
        seconds: 2
    - action: script.sonos_play
      data:
        devices:
          - media_player.sonos_device_wohnzimmer
          - media_player.sonos_device_kuche
        source: http://192.168.178.10:8123/local/sounds/dog_barking.mp3
        volume: 0.3
